services:
  etl:
    build:
      context: ${PWD}
      dockerfile: ./src/Dockerfile
    container_name: etl
    depends_on:
      minio:
        condition: service_healthy
      postgis:
        condition: service_healthy
    volumes:
      - ${PWD}/src:/app
      - ${PWD}/notebooks:/app/notebooks
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_URL: "http://minio:9000"
      POSTGIS_HOST: postgis
      POSTGIS_PORT: 5432
      POSTGIS_USER: admin
      POSTGIS_PASSWORD: admin
      POSTGIS_DB: dop
      DABH_API: "https://ckan.pbh.gov.br/api/3/action"
